version: '3.8'

services:
  frontend:
    image: nginx:alpine
    ports:
      - "1902:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3000"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
